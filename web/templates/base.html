<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}MutualScope{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
<header class="site-header">
    <div class="container nav-wrap">
        <a class="brand" href="{{ url_for('home') }}">MutualScope</a>
        <nav class="nav-links" aria-label="Primary navigation">
            <a href="{{ url_for('home') }}" class="nav-link {% if request.path == '/' %}active{% endif %}">Home</a>
            <a href="{{ url_for('compare_funds') }}" class="nav-link {% if request.path.startswith('/compare') %}active{% endif %}">Compare</a>
        </nav>
    </div>
</header>

<main class="container page-content">
    {% block content %}{% endblock %}
</main>

<footer class="site-footer">
    <div class="container footer-wrap">
        <p>Financial intelligence for smarter mutual fund decisions.</p>
        <p>&copy; <span id="year"></span> MutualScope</p>
    </div>
</footer>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
